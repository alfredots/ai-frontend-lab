        --border: #e5dfd0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top right, #f4efe1, var(--bg));

      main {
        max-width: 960px;

      }

      }
      .card {

        padding: 1rem;

      }
      .card h2 {
        margin: 0;
        font-size: 1.25rem;
      }
      .card p {
        margin: 0.8rem 0;
      }
      .actions {
        display: flex;
        gap: 0.8rem;
        flex-wrap: wrap;
      }
      .actions a {
        border: 1px solid var(--accent);
        color: var(--accent);
        text-decoration: none;
        border-radius: 999px;
        padding: 0.35rem 0.8rem;
        font-weight: 600;
      }
      .actions a:hover {
        background: var(--accent);
        color: #fff;
      }
      .empty {
        color: var(--muted);
        border: 1px dashed var(--border);
        padding: 1rem;
        border-radius: 12px;
      }
      footer {
        margin-top: 2rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
      code {

        padding: 0.08rem 0.3rem;
